# Local development stack for Synapse Proxy.
#
# Brings up: Redis (with RediSearch for L2 vector cache), Postgres
# (for the Next.js dashboard's Prisma data), the proxy (Rust embedder
# + Go data plane), and the dashboard (Next.js 14).
#
# Usage:
#   cd G:/Optitoken
#   docker compose -f docker-compose.local.yml up --build
#   # Wait for all 4 services to report healthy (60-120s on first run
#   # because of the Rust+model download).
#   # Dashboard is at http://localhost:3000
#   # Proxy is at   http://localhost:8080
#
# This stack mirrors production but uses local file paths and seeds
# the dashboard with a default superadmin (see .env below).

name: synapse-local

services:

  redis:
    image: redis/redis-stack-server:7.4.0-v3
    container_name: synapse-redis
    ports:
      - "127.0.0.1:6380:6379"
    command: >
      sh -c "
        redis-stack-server --bind 0.0.0.0 --protected-mode yes --requirepass $${REDIS_PASSWORD:-local-dev-password}
      "
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-local-dev-password}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-local-dev-password} ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    container_name: synapse-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-optitoken_db}"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-optitoken_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  upstream-mock:
    image: python:3.11-alpine
    container_name: synapse-upstream-mock
    volumes:
      - ./proxy:/app
    working_dir: /app
    command: python -u upstream_mock.py 9090
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/v1/models"]
      interval: 5s
      timeout: 3s
      retries: 5

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: synapse-proxy
    depends_on:
      redis:
        condition: service_healthy
      upstream-mock:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-local-dev-password}"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-optitoken_db}?sslmode=disable"
      OPENAI_BASE_URL: ""
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-5a8e1b0c2d3e4f5061728394a5b6c7d8e9f0a1b2c3d4e5f60718293a4b5c6d7e}"
      DEFAULT_VIRTUAL_KEY: ""
      MINIMAX_UPSTREAM_URL: "http://upstream-mock:9090/v1/chat/completions"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: synapse-dashboard
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-optitoken_db}?schema=public"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-local-dev-secret-do-not-use-in-prod}"
      NEXTAUTH_URL: "http://localhost:3000"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-local-dev-password}@redis:6379"
      PROXY_URL: "http://synapse-proxy:8080"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-5a8e1b0c2d3e4f5061728394a5b6c7d8e9f0a1b2c3d4e5f60718293a4b5c6d7e}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@synapse.local}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-admin1234}"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 90s   # npm install + next build can take a while

volumes:
  redis_data:
  pg_data:
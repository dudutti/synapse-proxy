version: '3.8'

services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: optitoken-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  onnx-embedder:
    build: ./onnx-embedder
    container_name: optitoken-onnx
    ports:
      - "8000:8000"
    restart: unless-stopped

  proxy:
    build: .
    container_name: optitoken-proxy
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - ONNX_API_URL=http://onnx-embedder:8000/embed
    depends_on:
      - redis
      - onnx-embedder
    restart: unless-stopped

volumes:
  redis_data:

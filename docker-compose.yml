version: '3.8'

# Local-dev compose file for the Synapse Proxy engine.
#
# Bring up Postgres + Redis + the ONNX embedder + the Go proxy, all on
# the host network, no TLS, no dashboard. For production deployment see
# docker-compose.prod.yml (private repo).
#
# All credentials below are local-dev placeholders. Override with
# environment variables when starting the stack.

services:
  postgres:
    image: postgres:15
    container_name: synapse-proxy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synapse-proxy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-please-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-synapse-proxy_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synapse-proxy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    # We build a thin custom image on top of redis/redis-stack-server
    # so that AOF persistence is ON and the bind-mounted volume is
    # actually used. Without this, every container restart wipes all
    # keys — which breaks the proxy entirely because the proxy reads
    # virtual keys from Redis (not Postgres). We hit this in production
    # on 2026-06-17. See redis-start.sh + redis-stack-override.conf.
    build:
      context: .
      dockerfile: redis-stack.Dockerfile
    image: synapse-proxy-redis:local
    container_name: synapse-proxy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  proxy:
    build: ./proxy
    container_name: synapse-proxy
    ports:
      - "8080:8080"
      - "1234:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-synapse-proxy}:${POSTGRES_PASSWORD:-please-change-me}@postgres:5432/${POSTGRES_DB:-synapse-proxy_db}?sslmode=disable
      # A free-tier virtual key is auto-seeded on first boot and printed
      # in the proxy logs. Override here to use a specific key in dev.
      # DEFAULT_VIRTUAL_KEY=sk-opti-CHANGE-ME
      # FORCE_MODEL=minimax-m2.7
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

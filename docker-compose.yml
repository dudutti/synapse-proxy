version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: optitoken-postgres
    environment:
      POSTGRES_USER: optitoken
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: optitoken_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: optitoken-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  onnx-embedder:
    build: ./proxy/onnx-embedder
    container_name: optitoken-onnx
    ports:
      - "8000:8000"
    restart: unless-stopped

  proxy:
    build: ./proxy
    container_name: optitoken-proxy
    ports:
      - "8080:8080"
      - "1234:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - DATABASE_URL=postgresql://optitoken:password123@postgres:5432/optitoken_db?sslmode=disable
      - ONNX_API_URL=http://onnx-embedder:8000/embed
      - DEFAULT_VIRTUAL_KEY=sk-opti-fad650fdfa2ef0619a18a1a95ded6172
      - FORCE_MODEL=MiniMax-M2.7
    depends_on:
      - redis
      - onnx-embedder
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

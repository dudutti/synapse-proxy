# Override of the redis-stack-server default config.
#
# The default /etc/redis-stack.conf ships:
#   port 6379
#   daemonize no
#   loadmodule /opt/redis-stack/lib/rediscompat.so
#   loadmodule /opt/redis-stack/lib/redisearch.so
#   loadmodule /opt/redis-stack/lib/redistimeseries.so
#   loadmodule /opt/redis-stack/lib/rejson.so
#   loadmodule /opt/redis-stack/lib/redisbloom.so
#   loadmodule /opt/redis-stack/lib/redisgears.so ...
#
# The redis-stack-server wrapper binary forces:
#   dir /var/lib/redis-stack
#   save ""           (no snapshot persistence)
#   appendonly no     (no AOF persistence)
#
# Without overriding dir + save + appendonly, Redis wipes all keys on
# every container restart. That breaks virtual-key validation in the
# proxy because the proxy reads keys from Redis, not Postgres. After a
# Redis restart, every request 401s until someone manually re-runs
# sync_keys.js — we hit this in production on 2026-06-17.
#
# This file is loaded by our custom entrypoint /redis-start.sh which
# invokes `redis-server /etc/redis-stack-override.conf ...`. Modules
# are NOT declared here because the same loadmodule issue bites when
# they appear both in the conf and on the CLI; the entrypoint script
# passes them on the CLI instead.

port 6379
daemonize no
protected-mode no

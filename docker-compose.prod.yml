version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: optitoken-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-optitoken}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-optitoken_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    container_name: optitoken-redis
    # IMPORTANT: use `redis-stack-server` (NOT plain `redis-server`).
    # The redis-stack-server binary is the one that loads the RediSearch
    # module on startup, which we need for the L2 semantic cache
    # (`FT.SEARCH idx:l2cache ...`). Plain `redis-server` would silently
    # load no module and break L2.
    command:
      - redis-stack-server
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  onnx-embedder:
    build: ./proxy/onnx-embedder
    container_name: optitoken-onnx
    restart: unless-stopped

  proxy:
    build: ./proxy
    container_name: optitoken-proxy
    environment:
      - REDIS_ADDR=redis:6379
      - ONNX_API_URL=http://onnx-embedder:8000/embed
      - DATABASE_URL=postgresql://${POSTGRES_USER:-optitoken}:${POSTGRES_PASSWORD:-password123}@postgres:5432/${POSTGRES_DB:-optitoken_db}?sslmode=disable
      - PORT=8080
    depends_on:
      - redis
      - postgres
      - onnx-embedder
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    container_name: optitoken-dashboard
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-optitoken}:${POSTGRES_PASSWORD:-password123}@postgres:5432/${POSTGRES_DB:-optitoken_db}?sslmode=disable
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your_super_secret_string_123}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      - REDIS_URL=redis://redis:6379
      - PROXY_URL=http://proxy:8080
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    depends_on:
      - postgres
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: optitoken-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - proxy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
